<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private Access 💙</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;

    /* animated gradient */
    background: linear-gradient(-45deg, #0f0f0f, #1a1a1a, #2b1055, #000000);
    background-size: 400% 400%;
    animation: bgMove 10s ease infinite;
}

@keyframes bgMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* floating glow orbs */
.orb {
    position: absolute;
    width: 200px;
    height: 200px;
    background: rgba(255, 77, 109, 0.2);
    border-radius: 50%;
    filter: blur(80px);
    animation: floatOrb 8s infinite alternate;
}

.orb:nth-child(1) { top: 10%; left: 10%; }
.orb:nth-child(2) { bottom: 10%; right: 10%; background: rgba(138, 43, 226, 0.2); }

@keyframes floatOrb {
    from { transform: translateY(0px) scale(1); }
    to { transform: translateY(-40px) scale(1.2); }
}

/* LOGIN CARD */
.container {
    position: relative;
    z-index: 2;
    width: 320px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 30px rgba(255, 77, 109, 0.3);

    text-align: center;
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h2 {
    color: white;
    margin-bottom: 5px;
}

p {
    color: #ccc;
    font-size: 14px;
}

/* INPUT */
input {
    width: 90%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    text-align: center;
    transition: 0.3s;
}

input:focus {
    background: rgba(255,255,255,0.2);
    transform: scale(1.05);
}

/* BUTTON */
button {
    width: 95%;
    padding: 12px;
    margin-top: 10px;
    background: linear-gradient(45deg, #ff4d6d, #ff1f4b);
    border: none;
    border-radius: 15px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(255, 77, 109, 0.4);
}

button:hover {
    transform: scale(1.05);
}

/* ERROR */
#error {
    color: #ff4d6d;
    margin-top: 10px;
    font-size: 13px;
}

/* FLOATING EMOJIS */
.emoji {
    position: absolute;
    font-size: 20px;
    animation: floatUp 8s linear infinite;
    opacity: 0.8;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- glowing background orbs -->
<div class="orb"></div>
<div class="orb"></div>

<!-- LOGIN BOX -->
<div class="container">
    <h2>🔒 Private Access</h2>
    <p>Only for someone special 💙</p>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Enter 💖</button>

    <p id="error"></p>
</div>

<!-- FLOATING EMOJIS -->
<div id="emoji-container"></div>

<script>

/* LOGIN */
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "@Nafha" && pass === "0507BDY") {
        window.location.href = "intro.html";
    } else {
        document.getElementById("error").innerHTML = "Wrong username or password 💔";
    }
}

/* EMOJIS */
const emojis = ["🥰","❤️","😍","💞","💓","🥳","💝","💖","❣️","💕"];

function createEmoji() {
    const emoji = document.createElement("div");
    emoji.classList.add("emoji");
    emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    emoji.style.left = Math.random() * 100 + "vw";
    emoji.style.animationDuration = (5 + Math.random() * 5) + "s";

    document.body.appendChild(emoji);

    setTimeout(() => emoji.remove(), 8000);
}

setInterval(createEmoji, 400);
</script>

</body>
</html>
