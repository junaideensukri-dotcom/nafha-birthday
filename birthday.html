<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #ffdde1, #ee9ca7, #fad0c4, #fbc2eb);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
    text-align: center;
    color: white;
}

/* background animation */
@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* HEADER */
h1 {
    margin-top: 30px;
    font-size: 36px;
    text-shadow: 0 0 15px #ff4d6d;
}

.message {
    font-size: 18px;
    margin: 10px auto;
    max-width: 600px;
    opacity: 0.9;
}

/* GRID */
.video-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 30px;
    max-width: 1200px;
    margin: auto;
}

/* VIDEO CARD */
.video-box {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    transition: 0.3s ease;
}

.video-box:hover {
    transform: scale(1.03);
    box-shadow: 0 0 30px rgba(255,77,109,0.4);
}

/* VIDEO */
video {
    width: 100%;
    border-radius: 15px;
    outline: none;
}

/* BUTTON */
button {
    margin: 30px;
    padding: 14px 30px;
    background: linear-gradient(45deg, #ff4d6d, #ff1f4b);
    border: none;
    border-radius: 30px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255,77,109,0.4);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
}

/* soft glow overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent);
    pointer-events: none;
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Dear 🎉</h1>

<div class="message">
    <p>You are the most special person in my life 💖</p>
    <p>These moments are small memories but mean everything to me ❤️</p>
</div>

<!-- VIDEO SECTION -->
<div class="video-container">

    <div class="video-box"><video controls><source src="video1.mp4" type="video/mp4"></video></div>
    <div class="video-box"><video controls><source src="video2.mp4" type="video/mp4"></video></div>
    <div class="video-box"><video controls><source src="video3.mp4" type="video/mp4"></video></div>
    <div class="video-box"><video controls><source src="video4.mp4" type="video/mp4"></video></div>
    <div class="video-box"><video controls><source src="video5.mp4" type="video/mp4"></video></div>
    <div class="video-box"><video controls><source src="video6.mp4" type="video/mp4"></video></div>
    <div class="video-box"><video controls><source src="video7.mp4" type="video/mp4"></video></div>
    <div class="video-box"><video controls><source src="video8.mp4" type="video/mp4"></video></div>

</div>

<!-- BUTTON -->
<button onclick="goNext()">Watch Something Special 💖</button>

<script>
function goNext() {
    window.location.href = "special.html";
}
</script>

</body>
</html>
